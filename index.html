<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mllr.space — miller</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0a'/><text x='16' y='23' text-anchor='middle' font-family='Cal Sans,Inter,sans-serif' font-weight='600' font-size='22' fill='%23e6e6e6'>m</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>miller<span class="cursor"></span></h1>
      <p class="tagline">Software engineer, building things that matter.</p>
    </header>

    <nav class="section-nav">
      <button class="nav-btn active" data-section="about">About</button>
      <button class="nav-btn" data-section="work">Work</button>
      <button class="nav-btn" data-section="projects">Projects</button>
      <button class="nav-btn" data-section="skills">Skills</button>
    </nav>

    <div class="section-panel" id="panel-about">
      <div id="about"></div>
    </div>

    <div class="section-panel hidden" id="panel-work">
      <div id="work"></div>
    </div>

    <div class="section-panel hidden" id="panel-projects">
      <div id="projects"></div>
    </div>

    <div class="section-panel hidden" id="panel-skills">
      <div id="skills"></div>
    </div>
  </div>

  <footer>
    <div class="links" style="justify-content:center;margin-bottom:12px">
      <a href="https://github.com/millerb08" target="_blank" rel="noopener">github.com/millerb08</a>
      <a href="mailto:miller.steffens@gmail.com">miller.steffens@gmail.com</a>
    </div>
    <span>mllr.space</span>
  </footer>

  <script src="js/about.js"></script>
  <script src="js/work.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/skills.js"></script>
  <script>
    const btns = document.querySelectorAll('.nav-btn');
    const panels = document.querySelectorAll('.section-panel');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.section).classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
